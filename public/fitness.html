let registry = fitnessProducts.map(p => ({ ...p, qty: 0 }));

function updateClock() { document.getElementById('live-clock').textContent = new Date().toLocaleTimeString('en-IN', { hour12: false }); }
setInterval(updateClock, 1000);

function updatePriceLabel() {
    document.getElementById('price-val').innerText = parseInt(document.getElementById('price-range').value).toLocaleString('en-IN');
    filterProducts();
}

// --- ELITE CART ENGINE ---
function syncToGlobalCart() {
    let globalCart = JSON.parse(localStorage.getItem('cart')) || [];
    const localActive = registry.filter(p => p.qty > 0).map(p => ({
        name: p.name, price: p.price, qty: p.qty
    }));
    const otherCategoryItems = globalCart.filter(gItem => !registry.some(rItem => rItem.name === gItem.name));
    const finalCart = [...otherCategoryItems, ...localActive];
    localStorage.setItem('cart', JSON.stringify(finalCart));
    document.getElementById('cart-count').innerText = finalCart.reduce((acc, item) => acc + item.qty, 0);
}

function filterProducts() {
    const query = document.getElementById('search-input').value.toLowerCase();
    const max = parseInt(document.getElementById('price-range').value);
    const selectedCats = Array.from(document.querySelectorAll('.cat-check:checked')).map(cb => cb.value);
    let filtered = registry.filter(p => {
        const matchesSearch = p.name.toLowerCase().includes(query) || p.spec.toLowerCase().includes(query);
        return matchesSearch && p.price <= max && selectedCats.includes(p.category);
    });
    renderProducts(filtered);
}

function updateItem(id, key, val) {
    const item = registry.find(p => p.id === id);
    item[key] = val;
    syncToGlobalCart();
    updateSummary();
    renderProducts();
}

function renderProducts(list = registry) {
    const container = document.getElementById("product-list");
    container.innerHTML = list.map((p) => `
        <div class="marketplace-card">
            <div class="relative bg-white h-44 flex items-center justify-center p-6"><img src="${p.img}" class="max-h-full transition-transform hover:scale-105"></div>
            <div class="p-5 flex-1 bg-black">
                <span class="text-[9px] font-bold text-amber-400 uppercase">${p.category}</span>
                <h3 class="text-xs font-bold text-white uppercase truncate">${p.name}</h3>
                <div class="benchmark-bar"><div class="benchmark-fill" style="width: ${p.performance}%"></div></div>
                <p class="text-[9px] font-mono text-white/30 mt-2">${p.spec}</p>
            </div>
            <div class="qty-node">
                <div onclick="updateItem(${p.id}, 'qty', Math.max(0, ${p.qty - 1}))" class="qty-btn"><i class="fas fa-minus text-[10px]"></i></div>
                <span class="w-12 text-center text-white font-mono">${p.qty}</span>
                <div onclick="updateItem(${p.id}, 'qty', ${p.qty + 1})" class="qty-btn"><i class="fas fa-plus text-[10px]"></i></div>
            </div>
            <div class="price-priority-box">₹${p.price.toLocaleString('en-IN')}</div>
        </div>`).join("");
}

        return;
    }
    container.innerHTML = activeItems.map(p => `
        <div class="bg-white/5 p-3 rounded-lg border border-white/10 mb-2">
            <div class="flex justify-between items-start"><span class="text-[10px] font-bold text-white uppercase">${p.name}</span><span class="text-[10px] font-mono text-amber-400">x${p.qty}</span></div>
        </div>`).join("");
    const total = activeItems.reduce((acc, p) => acc + (p.price * p.qty), 0);
    document.getElementById("total-price").innerText = `₹${total.toLocaleString('en-IN')}`;
}

function secureEntry() { syncToGlobalCart(); window.location.href = "checkout.html"; }

document.addEventListener("DOMContentLoaded", () => {
    const globalCart = JSON.parse(localStorage.getItem('cart')) || [];
    globalCart.forEach(gItem => {
        const localMatch = registry.find(rItem => rItem.name === gItem.name);
        if(localMatch) localMatch.qty = gItem.qty;
    });
    renderProducts(); updateSummary(); updateClock(); syncToGlobalCart();
});
</script>
</body>
</html>
