<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Home & Kitchen | Luxury Living</title>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>

    <style>
        :root { --neon-gold: #fbbf24; --bg-dark: #050505; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-dark); color: #f8fafc; margin: 0; overflow-x: hidden; }
        .grid-bg { position: fixed; inset: 0; background-image: linear-gradient(rgba(251,191,36,0.02) 1px,transparent 1px), linear-gradient(90deg,rgba(251,191,36,0.02) 1px,transparent 1px); background-size: 50px 50px; z-index: -1; mask-image: radial-gradient(circle at center, black, transparent 90%); }
        
        .marketplace-card { background: #0a0a0a; border-radius: 16px; border: 1px solid #1a1a1a; transition: 0.3s cubic-bezier(0.23, 1, 0.32, 1); overflow: hidden; display: flex; flex-direction: column; height: 100%; position: relative; }
        .marketplace-card:hover { border-color: var(--neon-gold); transform: translateY(-3px); }
        
        .price-priority-box { background: #fff; color: #000; font-family: 'JetBrains Mono', monospace; font-size: 1.1rem; font-weight: 800; padding: 0.7rem 1rem; text-align: center; width: 100%; border-top: 1px solid var(--neon-gold); }
        .official-nav { background: rgba(5, 5, 5, 0.95); backdrop-filter: blur(10px); border-bottom: 1px solid #1a1a1a; }
        
        .qty-node { background: rgba(255,255,255,0.03); display: flex; align-items: center; justify-content: center; border-top: 1px solid #1a1a1a; }
        .qty-btn { padding: 10px 18px; transition: 0.2s; color: var(--neon-gold); font-weight: bold; cursor: pointer; }
        .qty-btn:hover { background: var(--neon-gold); color: black; }

        .nav-btn { background: linear-gradient(135deg, #fbbf24, #f59e0b); color: #000; padding: 8px 16px; border-radius: 8px; font-weight: bold; text-decoration: none; transition: all 0.3s; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
        .nav-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(251,191,36,0.4); }
        
        .filter-checkbox { width: 14px; height: 14px; accent-color: #fbbf24; cursor: pointer; }
        .filter-checkbox:checked { outline: 2px solid #fbbf24; outline-offset: 2px; }
        
        .filter-section { transition: all 0.3s ease; overflow: hidden; }
        .filter-section.collapsed { max-height: 0; opacity: 0; }
        .filter-section.expanded { max-height: 500px; opacity: 1; }
        
        .filter-toggle { cursor: pointer; user-select: none; display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #1a1a1a; margin-bottom: 12px; }

        .review-input { background: #111; border: 1px solid #222; color: #aaa; font-size: 10px; width: 100%; border-radius: 4px; padding: 6px 8px; margin-top: 8px; outline: none; }
        .review-input:focus { border-color: var(--neon-gold); }

        .summary-panel { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 16px; padding: 24px; position: sticky; top: 110px; max-height: 80vh; display: flex; flex-direction: column; }

        .benchmark-bar { height: 2px; background: #222; width: 100%; border-radius: 2px; margin-top: 4px; overflow: hidden; }
        .benchmark-fill { height: 100%; background: var(--neon-gold); box-shadow: 0 0 10px var(--neon-gold); transition: width 1s ease-out; }

        #success-popup { backdrop-filter: blur(8px); opacity: 0; pointer-events: none; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        #success-popup.active { opacity: 1; pointer-events: auto; }
        #success-popup .popup-content { transform: scale(0.9) translateY(20px); transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); }
        #success-popup.active .popup-content { transform: scale(1) translateY(0); }

</head>

<div class="grid-bg"></div>

<div id="success-popup" class="fixed inset-0 z-[100] flex items-center justify-center bg-black/60">
    <div class="popup-content bg-[#0a0a0a] border border-amber-400 p-10 rounded-3xl text-center max-w-sm w-full mx-6 shadow-[0_0_50px_rgba(251,191,36,0.2)]">
        <div class="w-20 h-20 bg-amber-400 rounded-full flex items-center justify-center mx-auto mb-6">
            <i class="fas fa-check text-black text-3xl"></i>
        </div>
        <h2 class="text-2xl font-black italic tracking-tighter text-white mb-2 uppercase">Order Confirmed</h2>
        <p class="text-[10px] text-white/40 font-mono tracking-widest uppercase mb-8">Luxury shipment initiated</p>
        <button onclick="closePopup()" class="w-full bg-white text-black py-3 rounded-lg font-black uppercase text-[10px] tracking-[0.2em] hover:bg-amber-400 transition-all">Dismiss</button>
    </div>
</div>

<nav class="official-nav flex items-center justify-between py-5 px-10 sticky top-0 z-50">

    <div class="flex-grow max-w-[400px] relative hidden md:block mx-10">
        <input type="text" id="search-input" onkeyup="filterProducts()" placeholder="Search Luxury Collection..." class="w-full bg-white/5 border border-white/10 px-10 py-2 rounded-full outline-none text-xs text-white focus:border-amber-400">
    </div>

    <div class="flex gap-8 text-white font-bold text-sm items-center">
        <a href="home.html" class="nav-btn"><i class="fas fa-home mr-2"></i>Home</a>
        <a href="checkout.html" class="nav-btn"><i class="fas fa-shopping-cart mr-2"></i>Checkout</a>

            <span id="live-clock" class="font-mono text-white text-lg">00:00:00</span>
        </div>
        <div onclick="window.location.href='checkout.html'" class="relative cursor-pointer">
            <i class="fas fa-shopping-cart text-amber-400 text-xl"></i>

        </div>
    </div>
</nav>

<div class="container mx-auto px-6 py-10">
    <div class="flex flex-col lg:flex-row gap-8">
        
        <aside class="w-full lg:w-64 flex-shrink-0">

                        <option value="default">Default</option>
                        <option value="most-viewed">Most Popular</option>
                        <option value="rating">Highest Rated</option>
                        <option value="price-low">Price: Low to High</option>
                        <option value="price-high">Price: High to Low</option>
                    </select>
                </div>

                <div class="filter-toggle" onclick="toggleFilter()">
                    <h2 class="font-black text-[10px] uppercase tracking-widest text-white/50 italic">Category Filter</h2>
                    <i id="filter-icon" class="fas fa-chevron-down text-amber-400 text-xs transition-transform"></i>
                </div>
                <div id="filter-content" class="filter-section expanded">
                    <div class="flex flex-col gap-3 text-[11px] mb-8 mt-4">
                        <label class="flex items-center gap-3 cursor-pointer"><input type="checkbox" value="Kitchen" class="filter-checkbox cat-check" onchange="filterProducts()" checked> Kitchen Appliances</label>
                        <label class="flex items-center gap-3 cursor-pointer"><input type="checkbox" value="Cookware" class="filter-checkbox cat-check" onchange="filterProducts()" checked> Cookware & Utensils</label>
                        <label class="flex items-center gap-3 cursor-pointer"><input type="checkbox" value="Bedroom" class="filter-checkbox cat-check" onchange="filterProducts()" checked> Bedroom Essentials</label>
                        <label class="flex items-center gap-3 cursor-pointer"><input type="checkbox" value="Bathroom" class="filter-checkbox cat-check" onchange="filterProducts()" checked> Bathroom Accessories</label>
                        <label class="flex items-center gap-3 cursor-pointer"><input type="checkbox" value="Cleaning" class="filter-checkbox cat-check" onchange="filterProducts()" checked> Cleaning Equipment</label>
                        <label class="flex items-center gap-3 cursor-pointer"><input type="checkbox" value="Decor" class="filter-checkbox cat-check" onchange="filterProducts()" checked> Home Decor</label>
                        <label class="flex items-center gap-3 cursor-pointer"><input type="checkbox" value="Storage" class="filter-checkbox cat-check" onchange="filterProducts()" checked> Storage Solutions</label>
                    </div>
                    <p class="text-[9px] font-bold text-amber-400 uppercase mb-4 italic">Max Price: ₹<span id="price-val">10000</span></p>
                    <input type="range" id="price-range" min="500" max="10000" step="100" value="10000" oninput="updatePriceLabel()" class="w-full accent-amber-400">
                    <button onclick="clearAll()" class="w-full mt-10 border border-white/10 text-white/50 py-3 rounded-lg font-black uppercase text-[10px] hover:border-amber-400 transition-all">Clear All</button>
                </div>
            </div>
        </aside>

        <main class="flex-grow">
            <div id="product-list" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
        </main>

        <aside class="w-full lg:w-80 flex-shrink-0">
            <div class="summary-panel">
                <h2 class="font-black text-[10px] uppercase tracking-widest text-amber-400 mb-6 flex justify-between">
                    <span>Shopping Cart</span>
                    <i class="fas fa-shopping-bag"></i>
                </h2>
                <div id="summary-items" class="flex-grow overflow-y-auto space-y-4 mb-6 pr-2">
                    <p class="text-[10px] text-white/20 uppercase text-center py-10 tracking-[0.2em]">Cart Empty</p>
                </div>
                <div class="border-t border-white/10 pt-6">

                        <span id="total-price" class="font-mono text-xl font-bold text-amber-400">₹0</span>
                    </div>
                    <button id="secure-btn" onclick="secureEntry()" class="w-full bg-white text-black py-4 rounded-xl font-black uppercase text-xs tracking-widest hover:bg-amber-400 transition-all">
                        Go to Checkout
                    </button>
                </div>
            </div>
        </aside>
    </div>
</div>

let registry = products.map(p => ({ ...p, qty: 0, review: "" }));

function updateClock() { document.getElementById('live-clock').textContent = new Date().toLocaleTimeString('en-IN', { hour12: false }); }
setInterval(updateClock, 1000);

function updatePriceLabel() {
    document.getElementById('price-val').innerText = parseInt(document.getElementById('price-range').value).toLocaleString('en-IN');
    filterProducts();
}

// --- GLOBAL CART ENGINE ---
function syncToGlobalCart() {
    let globalCart = JSON.parse(localStorage.getItem('cart')) || [];
    const localActive = registry.filter(p => p.qty > 0).map(p => ({
        name: p.name, price: p.price, qty: p.qty
    }));
    const otherCategoryItems = globalCart.filter(gItem => !registry.some(rItem => rItem.name === gItem.name));
    const finalCart = [...otherCategoryItems, ...localActive];
    localStorage.setItem('cart', JSON.stringify(finalCart));
    document.getElementById('cart-count').innerText = finalCart.reduce((acc, item) => acc + item.qty, 0);
}

function filterProducts() {
    const query = document.getElementById('search-input').value.toLowerCase();
    const max = parseInt(document.getElementById('price-range').value);
    const sortBy = document.getElementById('sort-select').value;
    const selectedCats = Array.from(document.querySelectorAll('.cat-check:checked')).map(cb => cb.value);
    
    let filtered = registry.filter(p => {
        const matchesSearch = (p.name.toLowerCase().includes(query) || p.spec.toLowerCase().includes(query) || p.description.toLowerCase().includes(query));
        const matchesPrice = p.price <= max;
        const matchesCategory = selectedCats.includes(p.category);
        return matchesSearch && matchesPrice && matchesCategory;
    });
    
    if(sortBy === 'price-low') filtered.sort((a,b)=>a.price-b.price);
    if(sortBy === 'price-high') filtered.sort((a,b)=>b.price-a.price);
    if(sortBy === 'rating') filtered.sort((a,b)=>b.rating-a.rating);
    
    renderProducts(filtered);
}

function updateItem(id, key, val) {
    const item = registry.find(p => p.id === id);
    item[key] = val;
    syncToGlobalCart();
    updateSummary();
    renderProducts();
}

function renderProducts(list = registry) {
    const container = document.getElementById("product-list");
    container.innerHTML = list.map((p) => `
        <div class="marketplace-card">
            <div class="relative bg-white h-44 flex items-center justify-center p-6">
                <img src="${p.img}" alt="${p.name}" class="max-h-full transition-transform duration-500 hover:scale-105" loading="lazy">
            </div>
            <div class="p-5 flex-1 bg-black">
                <div class="flex justify-between items-center mb-1">
                    <span class="text-[9px] font-bold text-amber-400 uppercase tracking-widest">${p.category}</span>
                    <span class="text-[8px] font-mono text-white/50">${p.quality} QUALITY</span>
                </div>
                <h3 class="text-xs font-bold text-white uppercase truncate">${p.name}</h3>
                <div class="flex items-center gap-2 mb-2">
                    <div class="flex items-center">
                        ${Array.from({length: 5}, (_, i) => 
                            `<i class="fas fa-star text-[8px] ${i < Math.floor(p.rating) ? 'text-amber-400' : 'text-gray-600'}"></i>`
                        ).join('')}
                    </div>
                    <span class="text-[8px] text-white/60">(${p.reviews})</span>
                </div>
                <div class="benchmark-bar"><div class="benchmark-fill" style="width: ${p.quality}%"></div></div>
                <p class="text-[9px] font-mono text-white/30 mt-2 h-4 overflow-hidden">${p.spec}</p>
                <p class="text-[8px] text-white/50 mt-1 h-6 overflow-hidden">${p.description}</p>
                <input type="text" placeholder="Add notes..." value="${p.review}" onchange="updateItem(${p.id}, 'review', this.value)" class="review-input">
            </div>
            <div class="qty-node">
                <div onclick="updateItem(${p.id}, 'qty', Math.max(0, ${p.qty - 1}))" class="qty-btn"><i class="fas fa-minus text-[10px]"></i></div>
                <span class="w-12 text-center text-white font-mono text-sm">${p.qty}</span>
                <div onclick="updateItem(${p.id}, 'qty', ${p.qty + 1})" class="qty-btn"><i class="fas fa-plus text-[10px]"></i></div>
            </div>
            <div class="price-priority-box">₹${p.price.toLocaleString('en-IN')}</div>
        </div>`).join("");
}

function updateSummary() {
    const activeItems = registry.filter(p => p.qty > 0);
    const container = document.getElementById("summary-items");
    if(activeItems.length === 0) {
        container.innerHTML = `<p class="text-[10px] text-white/20 uppercase text-center py-10 tracking-[0.2em]">Cart Empty</p>`;
        document.getElementById("total-price").innerText = "₹0";
        document.getElementById("cart-count").innerText = "0";
        return;
    }
    container.innerHTML = activeItems.map(p => `
        <div class="bg-white/5 p-3 rounded-lg border border-white/10">
            <div class="flex justify-between items-start mb-1"><span class="text-[10px] font-bold text-white uppercase truncate w-32">${p.name}</span><span class="text-[10px] font-mono text-amber-400">x${p.qty}</span></div>
            <div class="flex justify-between text-[7px] text-white/40 font-bold uppercase">
                <span>${p.quality}% Quality</span>
                <span>₹${(p.price * p.qty).toLocaleString('en-IN')}</span>
            </div>
        </div>`).join("");
    const total = activeItems.reduce((acc, p) => acc + (p.price * p.qty), 0);
    document.getElementById("total-price").innerText = `₹${total.toLocaleString('en-IN')}`;
    
    // Get ALL items count including other pages
    const globalCart = JSON.parse(localStorage.getItem('cart')) || [];
    document.getElementById("cart-count").innerText = globalCart.reduce((acc, p) => acc + p.qty, 0);
}

function secureEntry() {
    syncToGlobalCart();
    window.location.href = "checkout.html";
}

function closePopup() { document.getElementById("success-popup").classList.remove("active"); clearAll(); }
function clearAll() { registry.forEach(p => { p.qty = 0; p.review = ""; }); syncToGlobalCart(); updateSummary(); renderProducts(); }

function toggleFilter() {
    const content = document.getElementById("filter-content");
    content.classList.toggle("collapsed");
    content.classList.toggle("expanded");
}

document.addEventListener("DOMContentLoaded", () => { 
    const globalCart = JSON.parse(localStorage.getItem('cart')) || [];
    globalCart.forEach(gItem => {
        const localMatch = registry.find(rItem => rItem.name === gItem.name);
        if(localMatch) localMatch.qty = gItem.qty;
    });
    renderProducts(); 
    updateClock(); 
    updateSummary();
    syncToGlobalCart();
});
</script>
