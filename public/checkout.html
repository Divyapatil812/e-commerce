<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Checkout | Premium Selection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        /* --- Core Variables --- */
        :root { 
            --neon-gold: #fbbf24; 
            --bg-dark: #050505; 
            --glass-white: rgba(255, 255, 255, 0.03);
        }

        /* --- Global Reset --- */
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg-dark); 
            color: #f8fafc; 
            margin: 0; 
            overflow-x: hidden; 
        }

        /* --- Background Visuals --- */
        .grid-bg {
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(251, 191, 36, 0.03) 1px, transparent 1px), 
                linear-gradient(90deg, rgba(251, 191, 36, 0.03) 1px, transparent 1px);
            background-size: 60px 60px; 
            z-index: -1;
            mask-image: radial-gradient(circle at center, black, transparent 80%);
        }

        /* --- Animations --- */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); filter: blur(10px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }
        .animate-reveal { 
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; 
        }

        /* --- UI Components --- */
        .gradient-text { 
            background: linear-gradient(135deg, #ffffff 30%, #fbbf24 100%); 
            -webkit-background-clip: text;
            background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }

        .checkout-card {
            background: var(--glass-white);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .checkout-card:hover {
            border-color: var(--neon-gold);
            box-shadow: 0 0 30px rgba(251, 191, 36, 0.1);
            transform: translateY(-2px);
        }

        .btn-elite {
            background: linear-gradient(90deg, #fbbf24, #d97706);
            color: black;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(251, 191, 36, 0.3);
            position: relative;
            overflow: hidden;
        }

        .btn-elite:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(251, 191, 36, 0.5);
        }

        .btn-elite::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: rgba(255, 255, 255, 0.2);
            transform: rotate(45deg) translateY(-100%);
            transition: 0.6s;
        }
        .btn-elite:hover::after {
            transform: rotate(45deg) translateY(100%);
        }
    </style>
</head>
<body>

    <div class="grid-bg"></div>

    <div class="max-w-6xl mx-auto px-6 py-20 relative z-10">
        <header class="mb-16 animate-reveal">
            <h1 class="text-5xl font-extrabold tracking-tighter mb-4">
                <span class="gradient-text uppercase">Complete Your Order</span>
            </h1>
            <div class="h-1 w-24 bg-[#fbbf24] rounded-full"></div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-12">
            
            <div class="lg:col-span-2 space-y-6" id="items-list">
                </div>

            <div class="lg:col-span-1 animate-reveal" style="animation-delay: 0.2s;">
                <div class="checkout-card p-10 rounded-3xl sticky top-12 border-b-4 border-b-[#fbbf24]">
                    <h3 class="text-2xl font-bold mb-8 tracking-tight">Order Summary</h3>
                    
                    <div class="space-y-5 text-gray-400">
                        <div class="flex justify-between items-center text-sm uppercase tracking-widest">
                            <span>Subtotal</span>
                            <span id="subtotal" class="text-white font-semibold text-lg">₹0</span>
                        </div>
                        <div class="flex justify-between items-center text-sm uppercase tracking-widest">
                            <span>Tax & Fees</span>
                            <span class="text-[#fbbf24] font-bold tracking-normal italic">COMPLIMENTARY</span>
                        </div>
                        
                        <div class="pt-8 border-t border-white/10">
                            <div class="flex justify-between items-end">
                                <span class="text-xs uppercase tracking-widest text-gray-500">Total Payable</span>
                                <span id="final-total" class="text-4xl font-extrabold text-white">₹0</span>
                            </div>
                        </div>
                    </div>

                    <button onclick="handlePayment()" class="btn-elite w-full mt-10 py-5 rounded-2xl font-black uppercase tracking-widest text-sm">
                        Proceed to Payment
                    </button>
                    
                    <button onclick="clearSelection()" class="w-full mt-6 text-xs text-gray-600 hover:text-red-400 transition tracking-widest uppercase">
                        Clear All Selections
                    </button>

                    <button onclick="window.location.href='home.html'" class="w-full mt-4 text-[10px] text-gray-500 hover:text-white transition tracking-widest uppercase">
                        ← Continue Shopping
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        /**
         * Core Logic: Loads data from localStorage and calculates the total
         */
        function renderCheckout() {
            // Get the global cart array from browser memory
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            
            const container = document.getElementById('items-list');
            const subtotalEl = document.getElementById('subtotal');
            const totalEl = document.getElementById('final-total');

            // 1. Check if the cart is empty
            if (cart.length === 0) {
                container.innerHTML = `
                    <div class="checkout-card p-20 rounded-3xl text-center animate-reveal">
                        <p class="text-gray-500 text-lg mb-8 tracking-widest uppercase italic">Your selection is currently empty.</p>
                        <button onclick="window.location.href='home.html'" class="text-[#fbbf24] border border-[#fbbf24] px-10 py-3 rounded-full hover:bg-[#fbbf24] hover:text-black transition font-bold uppercase text-xs tracking-[0.2em]">
                            Browse Categories
                        </button>
                    </div>`;
                subtotalEl.innerText = "₹0";
                totalEl.innerText = "₹0";
                return;
            }

            // 2. Loop through items and build the UI
            let grandTotal = 0;
            
            container.innerHTML = cart.map((item, index) => {
                const itemTotal = item.price * item.qty;
                grandTotal += itemTotal;

                return `
                    <div class="checkout-card p-8 rounded-2xl flex justify-between items-center animate-reveal" 
                         style="animation-delay: ${0.1 * index}s">
                        <div>
                            <span class="text-[10px] font-black text-[#fbbf24] tracking-[0.3em] uppercase opacity-70">
                                Premium Selection
                            </span>
                            <h4 class="text-2xl font-bold text-white mt-1">${item.name}</h4>
                            <div class="flex items-center gap-4 mt-2">
                                <p class="text-gray-500 text-sm uppercase italic">Quantity: ${item.qty}</p>
                                <button onclick="removeItem(${index})" class="text-red-500/50 hover:text-red-500 text-[10px] font-bold uppercase tracking-widest transition">Remove Item</button>
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="text-2xl font-black text-white">₹${itemTotal.toLocaleString('en-IN')}</p>
                        </div>
                    </div>
                `;
            }).join('');

            // 3. Update Summary totals
            subtotalEl.innerText = `₹${grandTotal.toLocaleString('en-IN')}`;
            totalEl.innerText = `₹${grandTotal.toLocaleString('en-IN')}`;
        }

        /**
         * Removes a specific item from the cart
         */
        function removeItem(index) {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            cart.splice(index, 1); // Delete item at specific index
            localStorage.setItem('cart', JSON.stringify(cart));
            renderCheckout(); // Re-render the page
        }

        /**
         * Clears everything and resets memory
         */
        function clearSelection() {
            if(confirm("Are you sure you want to discard all items?")) {
                localStorage.removeItem('cart');
                renderCheckout();
            }
        }

        /**
         * Handles redirect to payment
         */
        function handlePayment() {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            if(cart.length === 0) {
                alert("Please add items to your selection first.");
                return;
            }
            window.location.href = "/"; 
        }

        // Run the render function on page load
        window.onload = renderCheckout;
    </script>
</body>
</html>
